version: "3.9"
services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-local
    ports:
      - "5678:5678"
    env_file:
      - .env
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - zabbix-network
    restart: always

  task-runners:
    image: n8nio/n8n:latest
    container_name: n8n-runners
    env_file:
      - .env
    depends_on:
      - n8n
    networks:
      - zabbix-network
    restart: always

networks:
  zabbix-network:
    external: true

volumes:
  n8n_data:
