version: "3.9"
services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-local
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=femmy.tail7dee42.ts.net
      - N8N_URL=http://femmy.tail7dee42.ts.net:5678
      - N8N_SECURE_COOKIE=false
      - N8N_RUNNERS_ENABLED=true
      - N8N_RUNNERS_MODE=external
      - N8N_RUNNERS_AUTH_TOKEN=your-secure-random-token
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
      - N8N_NATIVE_PYTHON_RUNNER=true
      - TZ=Asia/Jakarta
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - zabbix-network
    restart: always

  task-runners:
    image: n8nio/n8n:latest
    container_name: n8n-runners
    environment:
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
      - N8N_RUNNERS_AUTH_TOKEN=your-secure-random-token
    depends_on:
      - n8n
    networks:
      - zabbix-network
    restart: always

networks:
  zabbix-network:
    external: true

volumes:
  n8n_data: