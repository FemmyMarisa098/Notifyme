services:
  pgsql:
    image: postgres:16
    container_name: zabbix-db
    environment:
      - POSTGRES_DB=zabbix
      - POSTGRES_USER=zabbix
      - POSTGRES_PASSWORD=zabbix_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - zabbix-network
    restart: always

  zabbix-server:
    image: zabbix/zabbix-server-pgsql:latest
    container_name: zabbix-server
    environment:
      - DB_SERVER_HOST=pgsql
      - POSTGRES_DB=zabbix
      - POSTGRES_USER=zabbix
      - POSTGRES_PASSWORD=zabbix_password
    ports:
      - "10051:10051"
    depends_on:
      - pgsql
    networks:
      - zabbix-network
    restart: always

  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:latest
    container_name: zabbix-web
    environment:
      - DB_SERVER_HOST=pgsql
      - POSTGRES_DB=zabbix
      - POSTGRES_USER=zabbix
      - POSTGRES_PASSWORD=zabbix_password
      - ZBX_SERVER_HOST=zabbix-server
      - ZBX_SERVER_PORT=10051
      - PHP_TZ=Asia/Jakarta
      - ZBX_SERVER_NAME=Zabbix Docker Monitor
    ports:
      - "8072:8080"
    depends_on:
      - pgsql
      - zabbix-server
    networks:
      - zabbix-network
    restart: always

  # ⭐ DOCKER MONITORING AGENT
  zabbix-agent-docker:
    image: zabbix/zabbix-agent:latest
    container_name: zabbix-agent-docker
    environment:
      - ZBX_SERVER_HOST=zabbix-server
      - ZBX_SERVER_PORT=10051
      - ZBX_HOSTNAME=docker-monitoring-host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro  # ⭐ Mount Docker socket
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/hostname:/etc/hostname:ro
    ports:
      - "10050:10050"
    networks:
      - zabbix-network
    depends_on:
      - zabbix-server
    restart: always

  # ⭐ DOCKER STATS EXPORTER (untuk detail container)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: zabbix-cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8080:8080"
    networks:
      - zabbix-network
    restart: always

volumes:
  postgres_data:

networks:
  zabbix-network:
    name: zabbix-network