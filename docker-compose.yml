services:
  pgsql:
    image: postgres:16
    container_name: zabbix-db
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - zabbix-network
    restart: always

  zabbix-server:
    image: zabbix/zabbix-server-pgsql:latest
    container_name: zabbix-server
    env_file:
      - .env
    ports:
      - "10051:10051"
    depends_on:
      - pgsql
    networks:
      - zabbix-network
    restart: always

  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:latest
    container_name: zabbix-web
    env_file:
      - .env
    ports:
      - "8072:8080"
    depends_on:
      - pgsql
      - zabbix-server
    networks:
      - zabbix-network
    restart: always

  # ⭐ DOCKER MONITORING AGENT
  zabbix-agent-docker:
    image: zabbix/zabbix-agent:latest
    container_name: zabbix-agent-docker
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/hostname:/etc/hostname:ro
    ports:
      - "10050:10050"
    depends_on:
      - zabbix-server
    networks:
      - zabbix-network
    restart: always

  # ⭐ DOCKER STATS EXPORTER
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: zabbix-cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8080:8080"
    networks:
      - zabbix-network
    restart: always

volumes:
  postgres_data:

networks:
  zabbix-network:
    name: zabbix-network
